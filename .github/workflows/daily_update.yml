name: Update IPTV Channels

on:
  schedule:
     - cron: '0 */6 * * *'   # ⏰ লোগো স্ক্রেপারের ৩০ মিনিট পর — যাতে নতুন লোগো ম্যাপিং তৈরি হয়
  workflow_dispatch:

# শুধু main branch-এর জন্য কনকারেন্সি লক, অন্য ব্রাঞ্চে প্যারালাল চলবে
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'iptv-update-main' || github.run_id }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Restore Updater Cache
        uses: actions/cache@v4
        with:
          path: |
            updater_state.json
            .cache/
          key: iptv-state-${{ github.run_id }}
          restore-keys: |
            iptv-state-

      - name: Run IPTV Updater
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python update_channels.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add categories/
          git add playlists/
          git add reports/
          git add updater_state.json
          git add index_channels.html

          if ! git diff --staged --quiet; then
            git commit -m "🚀 Auto-update: channels, logos & playlists [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit, skipping push."
          fi
