name: Logo Quality Check & Filter

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select action'
        required: true
        type: choice
        options:
          - check
          - filter
          - check-and-filter
        default: 'check'
      min_score:
        description: 'Minimum quality score (0-100)'
        required: false
        type: number
        default: 40

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow  # For image processing

      # ── OPTION 1: Check Only ──────────────────────────────────────
      - name: Run Quality Check
        if: github.event.inputs.action == 'check' || github.event.inputs.action == 'check-and-filter'
        run: |
          echo "🔍 Running logo quality analysis..."
          python logo_quality_check.py || echo "Script not found, creating inline..."

          # Inline quality check if script not found
          python -c "
import os, json, struct
from collections import defaultdict

LOGOS_DIR = 'logos'
REPORT_FILE = 'logo_quality_report.json'

stats = {
    'total': 0, 'valid_png': 0, 'corrupt': 0,
    'tiny': 0, 'small': 0, 'medium': 0, 'large': 0, 'huge': 0,
    'by_country': defaultdict(int),
    'low_quality': []
}

print(f'Analyzing logos in {LOGOS_DIR}/...')

for country in os.listdir(LOGOS_DIR):
    country_path = os.path.join(LOGOS_DIR, country)
    if not os.path.isdir(country_path):
        continue

    for fname in os.listdir(country_path):
        if not fname.endswith('.png'):
            continue

        stats['total'] += 1
        stats['by_country'][country] += 1

        filepath = os.path.join(country_path, fname)
        size = os.path.getsize(filepath)

        # Size categories
        if size < 1024:
            stats['tiny'] += 1
        elif size < 5120:
            stats['small'] += 1
        elif size < 20480:
            stats['medium'] += 1
        elif size < 102400:
            stats['large'] += 1
        else:
            stats['huge'] += 1

        # Check PNG validity
        try:
            with open(filepath, 'rb') as f:
                header = f.read(24)

            if header[:8] != b'PNG

':
                stats['corrupt'] += 1
                continue

            if header[12:16] == b'IHDR':
                width = struct.unpack('>I', header[16:20])[0]
                height = struct.unpack('>I', header[20:24])[0]
                stats['valid_png'] += 1

                # Quality score calculation
                score = 100
                if size < 2048:
                    score -= 40
                elif size < 5120:
                    score -= 20
                elif size > 102400:
                    score -= 30

                min_dim = min(width, height)
                if min_dim < 64:
                    score -= 50
                elif min_dim < 128:
                    score -= 20
                elif min_dim < 256:
                    score -= 10

                ratio = max(width, height) / max(min(width, height), 1)
                if ratio > 5:
                    score -= 20

                if score < 40:
                    stats['low_quality'].append({
                        'file': f'{country}/{fname}',
                        'score': score,
                        'size': size,
                        'width': width,
                        'height': height
                    })
        except:
            stats['corrupt'] += 1

# Save report
report = {
    'generated_at': __import__('datetime').datetime.now().isoformat(),
    'summary': {
        'total_logos': stats['total'],
        'valid_png': stats['valid_png'],
        'corrupt': stats['corrupt'],
        'quality_distribution': {
            'tiny (<1KB)': stats['tiny'],
            'small (1-5KB)': stats['small'],
            'medium (5-20KB)': stats['medium'],
            'large (20-100KB)': stats['large'],
            'huge (>100KB)': stats['huge']
        },
        'countries': len(stats['by_country']),
        'low_quality_count': len(stats['low_quality'])
    },
    'by_country': dict(stats['by_country']),
    'low_quality_logos': stats['low_quality'][:100]  # Top 100 worst
}

with open(REPORT_FILE, 'w') as f:
    json.dump(report, f, indent=2)

print(f'\n📊 Quality Report:')
print(f'   Total: {stats["total"]}')
print(f'   ✅ Valid: {stats["valid_png"]}')
print(f'   ❌ Corrupt: {stats["corrupt"]}')
print(f'   ⚠️  Low Quality: {len(stats["low_quality"])}')
print(f'   📁 Saved: {REPORT_FILE}')
"

      # ── OPTION 2: Filter Low Quality ──────────────────────────────
      - name: Filter Low Quality Logos
        if: github.event.inputs.action == 'filter' || github.event.inputs.action == 'check-and-filter'
        run: |
          echo "🗑️ Filtering low quality logos..."
          echo "Minimum score: ${{ github.event.inputs.min_score }}"

          python -c "
import os, json, struct, shutil

LOGOS_DIR = 'logos'
ARCHIVE_DIR = 'logos_low_quality_archive'
MIN_SCORE = ${{ github.event.inputs.min_score }}

removed = 0
archived = 0
errors = 0

print(f'Filtering logos with score < {MIN_SCORE}...')

for country in os.listdir(LOGOS_DIR):
    country_path = os.path.join(LOGOS_DIR, country)
    if not os.path.isdir(country_path):
        continue

    for fname in os.listdir(country_path):
        if not fname.endswith('.png'):
            continue

        filepath = os.path.join(country_path, fname)

        try:
            size = os.path.getsize(filepath)

            with open(filepath, 'rb') as f:
                header = f.read(24)

            if header[:8] != b'PNG

':
                os.remove(filepath)
                removed += 1
                continue

            if header[12:16] == b'IHDR':
                width = struct.unpack('>I', header[16:20])[0]
                height = struct.unpack('>I', header[20:24])[0]

                # Calculate score
                score = 100
                if size < 2048:
                    score -= 40
                elif size < 5120:
                    score -= 20
                elif size > 102400:
                    score -= 30

                min_dim = min(width, height)
                if min_dim < 64:
                    score -= 50
                elif min_dim < 128:
                    score -= 20
                elif min_dim < 256:
                    score -= 10

                ratio = max(width, height) / max(min(width, height), 1)
                if ratio > 5:
                    score -= 20

                if score < MIN_SCORE:
                    # Archive instead of delete
                    archive_country = os.path.join(ARCHIVE_DIR, country)
                    os.makedirs(archive_country, exist_ok=True)
                    shutil.move(filepath, os.path.join(archive_country, fname))
                    archived += 1
                    print(f'   Archived: {country}/{fname} (score: {score})')
        except Exception as e:
            print(f'   Error: {fname} - {e}')
            errors += 1

print(f'\n✅ Filter complete:')
print(f'   Removed (corrupt): {removed}')
print(f'   Archived (low quality): {archived}')
print(f'   Errors: {errors}')
"

      # ── Commit Results ──────────────────────────────────────────
      - name: Commit Results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git add logo_quality_report.json

          # Only add archive if filter was run
          if [ -d "logos_low_quality_archive" ]; then
            git add logos_low_quality_archive/
          fi

          if ! git diff --staged --quiet; then
            git commit -m "chore: logo quality ${{ github.event.inputs.action }} [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Results committed!"
          else
            echo "No changes to commit."
          fi
