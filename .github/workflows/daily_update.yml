name: Update IPTV Channels

on:
  schedule:
    - cron: '0 */6 * * *'   # প্রতি ৬ ঘণ্টায় — script ৫.৫h চলে, .৫h gap থাকে
  workflow_dispatch:          # Manual trigger

# একই সময়ে দুটো run চলবে না
concurrency:
  group: iptv-update
  cancel-in-progress: false   # চলমান run শেষ হোক, তারপর নতুনটা শুরু

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # 5h 55m — script নিজেই 5h 30m এ থামে
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

       # 💾 রানিং স্টেট এবং এপিআই ক্যাশ পুনরুদ্ধার (বড় অপটিমাইজেশন)
      - name: Restore Updater Cache
        uses: actions/cache@v4
        with:
          path: |
            updater_state.json
            .cache/
          key: iptv-state-${{ github.run_id }}
          restore-keys: |
            iptv-state-

      - name: Run IPTV Updater
        run: python update_channels.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add categories/ playlists/ reports/ updater_state.json
          git diff --quiet && git diff --staged --quiet \
            || git commit -m "🚀 Auto-update: channels, logos & playlists [skip ci]" \
            && git push
