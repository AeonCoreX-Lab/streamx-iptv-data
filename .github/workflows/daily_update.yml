Name: Update IPTV Channels

on:
  schedule:
    - cron: '0 */6 * * *'   # প্রতি ৬ ঘণ্টায় — script ৫.৫h চলে, .৫h gap থাকে
  workflow_dispatch:          # Manual trigger

# একই সময়ে দুটো run চলবে না (শুধু main branch-এর জন্য প্রজোয্য, টেস্ট ব্রাঞ্চে প্যারালাল চলবে)
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'iptv-update-main' || github.run_id }}
  cancel-in-progress: false   # চলমান run শেষ হোক, তারপর নতুনটা শুরু

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355      # 5h 55m — script নিজেই 5h 30m এ থামে
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 👈 Full history fetch, pull --rebase এর জন্য জরুরি

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

       # 💾 রানিং স্টেট এবং এপিআই ক্যাশ পুনরুদ্ধার (বড় অপটিমাইজেশন)
      - name: Restore Updater Cache
        uses: actions/cache@v4
        with:
          path: |
            updater_state.json
            .cache/
          key: iptv-state-${{ github.run_id }}
          restore-keys: |
            iptv-state-

      - name: Run IPTV Updater
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python update_channels.py

      - name: Commit & push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add categories/ playlists/ reports/ updater_state.json
          
          # চেক করবে কোনো নতুন পরিবর্তন আছে কি না
          if ! git diff --staged --quiet; then
            git commit -m "🚀 Auto-update: channels, logos & playlists [skip ci]"
            
            # পুশ করার আগে রিমোটের লেটেস্ট কোড লোকাল ব্রাঞ্চে রিবেস (মার্জ) করে নেবে
            git pull --rebase origin main
            
            git push
          else
            echo "No changes to commit, skipping push."
          fi
