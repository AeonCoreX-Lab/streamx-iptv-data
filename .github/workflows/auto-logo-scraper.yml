name: Auto Scrape IPTV Logos

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (was 2h — overlapping caused chaos)
  workflow_dispatch:

# Prevent two runs from colliding and corrupting state.json
concurrency:
  group: scrape-logos
  cancel-in-progress: false   # let the current run finish; queue next

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 340      # 5h 40m — GitHub default is 360m; we exit at 5h15m
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper
        env:
          PRIMARY_API_KEY: ${{ secrets.PRIMARY_API_KEY }}
        run: python logomaster.py

      - name: Commit logos + state
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add logos/ scraper_state.json
          git diff --quiet && git diff --staged --quiet \
            || git commit -m "chore: auto-add logos [skip ci]"
          git push