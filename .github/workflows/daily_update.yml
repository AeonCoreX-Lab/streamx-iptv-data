name: Update IPTV Channels

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout content
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # No duckduckgo needed — logo search uses only free public APIs (no key)
        python -m pip install requests typing_extensions lxml

    - name: Run Update Script
      run: python update_channels.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Auto-Updater"
        git config --global user.email "actions@github.com"
        git add .
        git diff --quiet && git diff --staged --quiet || \
          (git commit -m "🚀 Auto-updated channels, fixed logos & playlists" && git push)
