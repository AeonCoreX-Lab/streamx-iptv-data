Name: Auto Scrape IPTV Logos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# শুধু main branch-এর জন্য কনকারেন্সি লক করবে, অন্য ব্রাঞ্চে run_id দিয়ে ইউনিক রাখবে
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'scrape-logos-main' || github.run_id }}
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Restore Scraper State and Logos Cache
        id: logo-cache
        uses: actions/cache@v4
        with:
          path: |
            scraper_state.json        # ✅ ROOT e state file
            logos/
            channel_logo_mapping.json
          key: logo-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            logo-state-

      - name: Run Scraper
        env:
          LOGO_DEV_KEY: ${{ secrets.LOGO_DEV_KEY }}
          PRIMARY_API_KEY: ${{ secrets.PRIMARY_API_KEY }}
        run: python logomaster.py

      - name: Commit logos + state + reports
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          
          git add logos/ 
          git add reports/ 
          git add scraper_state.json        # ✅ ROOT e state
          git add channel_logo_mapping.json
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-add logos [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit, skipping push."
          fi
