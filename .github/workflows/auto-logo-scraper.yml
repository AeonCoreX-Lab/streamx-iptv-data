name: Auto Scrape IPTV Logos

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper Script
        env:
          PRIMARY_API_KEY: ${{ secrets.PRIMARY_API_KEY }} # Passes the secret to Python
        run: python logomaster.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add logos/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-added new channel logos [skip ci]"
          git push
