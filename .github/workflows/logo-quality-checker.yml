name: Logo Quality Check & Filter

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select action'
        required: true
        type: choice
        options:
          - check
          - filter
          - check-and-filter
        default: 'check'
      min_score:
        description: 'Minimum quality score (0-100)'
        required: false
        type: number
        default: 40

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # ── OPTION 1: Quality Check (logo_quality_check.py) ──────────────
      - name: Run Quality Check
        if: github.event.inputs.action == 'check' || github.event.inputs.action == 'check-and-filter'
        run: |
          if [ -f "logo_quality_check.py" ]; then
            echo "🔍 Running existing logo_quality_check.py..."
            python logo_quality_check.py
          else
            echo "❌ Error: logo_quality_check.py not found in repository root!"
            exit 1
          fi

      # ── OPTION 2: Filter Low Quality (quality_filter_snippet.py) ─────
      - name: Filter Low Quality Logos
        if: github.event.inputs.action == 'filter' || github.event.inputs.action == 'check-and-filter'
        env:
          MIN_SCORE_INPUT: ${{ github.event.inputs.min_score }}
        run: |
          if [ -f "quality_filter_snippet.py" ]; then
            echo "🗑️ Running quality_filter_snippet.py..."
            echo "Minimum score threshold: $MIN_SCORE_INPUT"
            python quality_filter_snippet.py
          else
            echo "❌ Error: quality_filter_snippet.py not found in repository root!"
            exit 1
          fi

      # ── Commit Results ──────────────────────────────────────────
      - name: Commit Results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # কোয়ালিটি চেকের রিপোর্ট ফাইল জেনারেট হলে অ্যাড করবে
          if [ -f "logo_quality_report.json" ]; then
            git add logo_quality_report.json
          fi

          # ফিল্টার রান হলে লো-কোয়ালিটি আর্কাইভ ফোল্ডার অ্যাড করবে
          if [ -d "logos_low_quality_archive" ]; then
            git add logos_low_quality_archive/
          fi

          if ! git diff --staged --quiet; then
            git commit -m "chore: logo quality ${{ github.event.inputs.action }} [skip ci]"
            git pull --rebase origin main
            git push
            echo "✅ Results committed successfully!"
          else
            echo "No changes to commit."
          fi
